name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.2.0). Defaults to the pushed tag.'
        required: false

permissions:
  contents: write   # create the GitHub Release and upload assets

jobs:
  release:
    name: Build, package & release
    runs-on: macos-15
    env:
      # Signing/notarization secrets are surfaced as env at the job level so
      # steps can gate on them with `if:`. All are optional — when absent the
      # workflow still builds and publishes an (unsigned) DMG.
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      NOTARY_APPLE_ID: ${{ secrets.APPLE_ID }}
      NOTARY_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      # Optional — when absent the release ships without an appcast.
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tooling
        run: brew install xcodegen create-dmg

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE_BASE64 != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"

          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$RUNNER_TEMP/cert.p12"

          # Allow codesign to use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep 'Developer ID Application' | head -1 | sed -E 's/.*"(.*)".*/\1/')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in the imported certificate."
            exit 1
          fi
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
          echo "Imported signing identity: $IDENTITY"

      - name: Build & package DMG
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: scripts/build-release.sh

      - name: Notarize & staple
        if: env.SIGNING_IDENTITY != '' && env.NOTARY_APPLE_ID != '' && env.NOTARY_PASSWORD != ''
        env:
          NOTARY_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          scripts/notarize.sh "$DMG_PATH"
          echo "NOTARIZED=1" >> "$GITHUB_ENV"

      - name: Checksum
        run: |
          cd dist
          shasum -a 256 *.dmg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate Sparkle appcast
        if: env.SPARKLE_ED_PRIVATE_KEY != ''
        run: |
          set -euo pipefail
          SPARKLE_VERSION=2.9.4
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle && tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          # Explicit path: the tarball also ships bin/old_dsa_scripts/sign_update
          # (legacy DSA), which must NOT be used for EdDSA signing.
          SIGN_UPDATE=/tmp/sparkle/bin/sign_update

          KEY_FILE="$(mktemp)"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          DMG="dist/ContainerUI-${VERSION}.dmg"
          SIG="$("$SIGN_UPDATE" "$DMG" --ed-key-file "$KEY_FILE")"
          rm -f "$KEY_FILE"

          PUBDATE="$(date -u '+%a, %d %b %Y %H:%M:%S +0000')"
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/ContainerUI-${VERSION}.dmg"
          {
            echo '<?xml version="1.0" encoding="utf-8"?>'
            echo '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">'
            echo '  <channel>'
            echo '    <title>ContainerUI</title>'
            echo '    <item>'
            echo "      <title>${VERSION}</title>"
            echo "      <pubDate>${PUBDATE}</pubDate>"
            echo "      <sparkle:version>${GITHUB_RUN_NUMBER}</sparkle:version>"
            echo "      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>"
            echo '      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>'
            echo "      <description><![CDATA[<p>ContainerUI ${VERSION}. See the <a href=\"https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VERSION}\">release notes</a>.</p>]]></description>"
            echo "      <enclosure url=\"${DOWNLOAD_URL}\" ${SIG} type=\"application/octet-stream\"/>"
            echo '    </item>'
            echo '  </channel>'
            echo '</rss>'
          } > dist/appcast.xml
          echo "----- appcast.xml -----"
          cat dist/appcast.xml

      - name: Compose release notes
        run: |
          {
            echo "## ContainerUI ${VERSION}"
            echo
            if [ "${NOTARIZED:-0}" = "1" ]; then
              echo "Signed with Developer ID and notarized by Apple — download the DMG, drag **ContainerUI** to Applications, and open it."
            elif [ -n "${SIGNING_IDENTITY:-}" ]; then
              echo "Signed with Developer ID but **not notarized**. On first launch, right-click the app and choose **Open**, or run:"
              echo '```'
              echo 'xattr -dr com.apple.quarantine /Applications/ContainerUI.app'
              echo '```'
            else
              echo "> ⚠️ **Unsigned build.** macOS Gatekeeper will block it until you clear the quarantine flag:"
              echo '```'
              echo 'xattr -dr com.apple.quarantine /Applications/ContainerUI.app'
              echo '```'
            fi
            echo
            echo "**Requires macOS 26 on Apple silicon** and Apple's \`container\` tool for the backend."
            echo
            echo "Verify your download:"
            echo '```'
            echo 'shasum -a 256 -c SHA256SUMS.txt'
            echo '```'
          } > dist/RELEASE_NOTES.md
          cat dist/RELEASE_NOTES.md

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ContainerUI-${{ steps.version.outputs.version }}
          path: |
            dist/*.dmg
            dist/SHA256SUMS.txt
            dist/appcast.xml

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/RELEASE_NOTES.md
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            dist/*.dmg
            dist/SHA256SUMS.txt
            dist/appcast.xml
